<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3c1a"/>
      <stop offset="100%" style="stop-color:#2c5f2d"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FFA000"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Chalk dots -->
  <circle cx="80" cy="80" r="3" fill="white" opacity="0.1"/>
  <circle cx="160" cy="40" r="2" fill="white" opacity="0.08"/>
  <circle cx="400" cy="100" r="3" fill="white" opacity="0.1"/>
  <circle cx="440" cy="400" r="2" fill="white" opacity="0.08"/>
  <circle cx="60" cy="350" r="3" fill="white" opacity="0.1"/>
  <!-- Backpack emoji area -->
  <text x="256" y="220" font-size="160" text-anchor="middle" dominant-baseline="middle">🎒</text>
  <!-- Cards behind backpack -->
  <rect x="100" y="270" width="80" height="100" rx="12" fill="#fffdf7" stroke="#e0d8c8" stroke-width="4" transform="rotate(-15 140 320)" opacity="0.7"/>
  <text x="140" y="330" font-size="40" text-anchor="middle" transform="rotate(-15 140 320)" opacity="0.7">?</text>
  <rect x="332" y="270" width="80" height="100" rx="12" fill="#fffdf7" stroke="#e0d8c8" stroke-width="4" transform="rotate(15 372 320)" opacity="0.7"/>
  <text x="372" y="330" font-size="40" text-anchor="middle" transform="rotate(15 372 320)" opacity="0.7">?</text>
  <!-- Title -->
  <text x="256" y="430" font-family="Arial Rounded MT Bold, Fredoka, sans-serif" font-size="52" font-weight="700" fill="url(#gold)" text-anchor="middle" letter-spacing="2">MEMORY</text>
  <text x="256" y="480" font-family="Arial Rounded MT Bold, Fredoka, sans-serif" font-size="40" font-weight="600" fill="white" text-anchor="middle" letter-spacing="4">RACE</text>
</svg>
